<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Producto | TiendaC</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header class="site-header is-scrolled" data-header>
      <div class="nav-shell">
        <a href="index.html" class="brand">
          <img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?auto=format&fit=crop&w=160&q=80" alt="Hilda's" class="brand__logo" />
          <div>
            <span class="brand__eyebrow">Studio</span>
            <strong>Hilda's</strong>
          </div>
        </a>
        <button class="nav-toggle" aria-label="Abrir menú" data-nav-toggle>
          <span></span><span></span><span></span>
        </button>
        <nav class="nav-links" data-nav-menu>
          <a href="index.html">Inicio</a>
          <a href="index.html#catalogo">Catálogo</a>
          <a href="index.html#contacto">Contacto</a>
          <button class="cart-button" data-open-cart>Carrito <span data-cart-count>0</span></button>
        </nav>
      </div>
    </header>
    <main class="product-detail-page">
      <div data-product-detail></div>
    </main>
    <footer class="footer" data-footer>
      <div class="footer-grid">
        <div>
          <div class="brand">
            <img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?auto=format&fit=crop&w=160&q=80" alt="Hilda's" class="brand__logo" />
            <div>
              <span class="brand__eyebrow">Store</span>
              <strong>Hilda's</strong>
            </div>
          </div>
          <p>Hilda's con presencia, color y actitud.</p>
        </div>
        <div>
          <h4>Contacto</h4>
          <p>WhatsApp: +51999999999</p>
          <p>Ubicación: Lima, Perú</p>
        </div>
        <div>
          <h4>Redes</h4>
          <div class="social-links">
            <a href="https://instagram.com/" target="_blank" rel="noreferrer">Instagram</a>
            <a href="https://tiktok.com/" target="_blank" rel="noreferrer">TikTok</a>
            <a href="https://facebook.com/" target="_blank" rel="noreferrer">Facebook</a>
          </div>
        </div>
      </div>
    </footer>
    <div class="cart-overlay" data-cart-overlay></div>
    <aside class="cart-panel" data-cart-panel>
      <div class="cart-panel__header">
        <div>
          <span class="section-kicker">Tu selección</span>
          <h3>Carrito</h3>
        </div>
        <button class="icon-button" data-close-cart aria-label="Cerrar carrito">×</button>
      </div>
      <div class="cart-items">
        <p class="empty-state">Tu carrito está vacío.</p>
      </div>
      <div>
        <div class="cart-total">
          <span>Total</span>
          <strong>S/ 0.00</strong>
        </div>
        <a class="btn btn-primary is-disabled">Enviar por WhatsApp</a>
      </div>
    </aside>
    <script src="js/ui.js"></script>
    <script type="module" src="js/store.js"></script>
  </body>
</html>
